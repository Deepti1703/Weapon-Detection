<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <!-- Reticle / Target Icon -->
  <g transform="translate(5, 5)">
    <!-- Outer circle -->
    <circle cx="15" cy="15" r="12" fill="none" stroke="#DC2626" stroke-width="2"/>
    <!-- Inner dashed circle -->
    <circle cx="15" cy="15" r="6" fill="none" stroke="#DC2626" stroke-width="1" stroke-dasharray="2 2"/>
    <!-- Crosshair lines -->
    <line x1="15" y1="0" x2="15" y2="30" stroke="#DC2626" stroke-width="1.5"/>
    <line x1="0" y1="15" x2="30" y2="15" stroke="#DC2626" stroke-width="1.5"/>
    <!-- Central AI node -->
    <circle cx="15" cy="15" r="3.5" fill="#111827" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  <!-- Brand Name Typography -->
  <text x="45" y="26" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="900" fill="#111827" letter-spacing="0.5">FORENSIC<tspan fill="#DC2626">.AI</tspan></text>
</svg>
