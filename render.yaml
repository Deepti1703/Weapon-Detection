services:
  # FastAPI backend service deployed via Docker
  - type: web
    name: woundai-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        value: "super_secret_forensic_key_123"
      - key: ALGORITHM
        value: HS256

  # React / Vite frontend static site service
  - type: web
    name: woundai-frontend
    env: static
    baseDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free
    # Make sure frontend routes API requests to the deployed backend service
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: woundai-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
